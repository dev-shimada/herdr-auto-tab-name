name: Project checks
description: >
  Runs the shared check suite (scripts/checks.sh) after provisioning the
  tools it needs, so CI and the release workflow validate exactly what the
  local release script validates. A composite action (not a reusable
  workflow) so the release job can run it in-place against its working tree.

runs:
  using: composite
  steps:
    - name: Install dependencies
      shell: bash
      run: npm ci

    - name: Provision check tooling
      shell: bash
      run: sudo apt-get update -qq && sudo apt-get install -y -qq zsh

    - name: Run check suite
      shell: bash
      run: scripts/checks.sh

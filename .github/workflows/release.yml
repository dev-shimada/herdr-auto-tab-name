name: Release

# Push a tag like v0.2.0 and this workflow does the rest:
#   1. sets `version` in herdr-plugin.toml and package.json to the tag on main
#   2. runs the same checks as CI
#   3. commits the bump to main and re-points the tag at that commit,
#      so `herdr plugin install --ref vX.Y.Z` sees the right version
#   4. creates a GitHub release with generated notes
#
# Tags must point at the tip of main (verified by the first step), since
# what gets released is main plus the version bump. Re-pushing an existing
# tag is safe: every step is idempotent (no version change -> no commit,
# release skipped if it already exists).

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Verify the tag points at the tip of main
        run: |
          TAG_COMMIT="$(git rev-parse "$GITHUB_REF_NAME^{commit}")"
          MAIN_HEAD="$(git rev-parse HEAD)"
          if [ "$TAG_COMMIT" != "$MAIN_HEAD" ]; then
            echo "::error::Tag $GITHUB_REF_NAME points at $TAG_COMMIT, but main is at $MAIN_HEAD. This workflow releases the tip of main; retag the current main head."
            exit 1
          fi

      - name: Bump versions to match tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

          sed -i "s/^version = \".*\"/version = \"$VERSION\"/" herdr-plugin.toml

          current="$(node -p "require('./package.json').version")"
          if [ "$current" != "$VERSION" ]; then
            npm version "$VERSION" --no-git-tag-version
          fi

          git diff --stat

      - name: Check
        run: |
          npm ci
          npm run check
          node tests/smoke.mjs

      - name: Commit bump and re-point tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if ! git diff --quiet; then
            git add herdr-plugin.toml package.json package-lock.json
            git commit -m "chore(release): v$VERSION"
            git push origin main
          fi

          # Re-point the tag only when the bump commit moved main past it.
          # Annotated tags are recreated with their message; signatures
          # cannot be carried over (the runner has no signing key).
          if [ "$(git rev-parse "$GITHUB_REF_NAME^{commit}")" != "$(git rev-parse HEAD)" ]; then
            if [ "$(git cat-file -t "$GITHUB_REF_NAME")" = "tag" ]; then
              git tag -f -a -m "$(git for-each-ref "refs/tags/$GITHUB_REF_NAME" --format='%(contents)')" "$GITHUB_REF_NAME"
            else
              git tag -f "$GITHUB_REF_NAME"
            fi
            git push -f origin "refs/tags/$GITHUB_REF_NAME"
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 ||
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes

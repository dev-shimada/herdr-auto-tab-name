name: Release

# Publishes a GitHub release when a version tag is pushed. The version bump
# itself happens locally via scripts/release.sh (bump, commit, tag, push),
# so this workflow never writes to the protected main branch — it only
# validates the tag and creates the release:
#   1. checks the tagged commit is on main and its files match the tag version
#   2. runs the same check suite as CI
#   3. creates a GitHub release with generated notes
#
# Re-pushing an existing tag is safe: release creation is skipped when the
# release already exists.

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm

      - name: Verify the tag is on main and versions match
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor HEAD origin/main; then
            echo "::error::Tag $GITHUB_REF_NAME is not on main. Cut releases with scripts/release.sh."
            exit 1
          fi

          VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST="$(node -e '
            const toml = require("node:fs").readFileSync("herdr-plugin.toml", "utf8");
            const m = toml.match(/^\s*version\s*=\s*"([^"]*)"/m);
            if (!m) {
              console.error("could not parse the version field from herdr-plugin.toml");
              process.exit(1);
            }
            process.stdout.write(m[1]);
          ')"
          if [ "$MANIFEST" != "$VERSION" ]; then
            echo "::error::herdr-plugin.toml version ($MANIFEST) does not match tag $GITHUB_REF_NAME. Cut releases with scripts/release.sh instead of tagging manually."
            exit 1
          fi

      # Same suite as CI (includes the package.json/manifest version
      # consistency check), so a broken state cannot be released.
      - uses: ./.github/actions/checks

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 ||
            gh release create "$GITHUB_REF_NAME" --title "$GITHUB_REF_NAME" --generate-notes

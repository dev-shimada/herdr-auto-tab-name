name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 22.18.0 is the documented minimum (first 22.x with type stripping
        # enabled by default); 24 covers current.
        node-version: ["22.18.0", "24"]
    name: check (node ${{ matrix.node-version }})
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - uses: ./.github/actions/checks

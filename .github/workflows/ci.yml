name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 22.18.0 is the documented minimum (first 22.x with type stripping
        # enabled by default); 24 covers current.
        node-version: ["22.18.0", "24"]
    name: check (node ${{ matrix.node-version }})
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - uses: ./.github/actions/checks
